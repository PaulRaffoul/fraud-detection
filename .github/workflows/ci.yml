name: CI — Lint, Type Check, Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Type Check + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy — predictor service
        run: uv run mypy services/predictor/

      - name: Pytest — predictor tests
        run: uv run pytest services/predictor/tests -v

      - name: Pytest — monitor tests
        run: uv run pytest services/monitor/tests -v
