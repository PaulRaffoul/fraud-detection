global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Producer service
  - job_name: "producer"
    static_configs:
      - targets: ["producer:8002"]

  # Predictor service
  - job_name: "predictor"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["predictor:8000"]

  # Monitor service (drift detection)
  - job_name: "monitor"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["monitor:8001"]
